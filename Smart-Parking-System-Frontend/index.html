<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ParkLK Management System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --saffron: #FF6B2B; --deep: #0B0F1A; --surface: #111827; }
        body { background: var(--deep); color: #f0f4ff; font-family: 'Inter', sans-serif; }
        .sidebar { background: var(--surface); height: 100vh; position: fixed; width: 240px; border-right: 1px solid #2d3748; }
        .main-content { margin-left: 240px; padding: 30px; }
        .nav-link { color: #8A97B0; padding: 12px 20px; transition: 0.3s; }
        .nav-link.active { background: rgba(255,107,43,0.1); color: var(--saffron); border-left: 4px solid var(--saffron); }
        .card { background: var(--surface); border: 1px solid #2d3748; color: white; border-radius: 12px; }
        .btn-primary { background: var(--saffron); border: none; }
        .table { color: #e2e8f0; border-color: #2d3748; }
        .status-badge { font-size: 0.75rem; padding: 4px 8px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="sidebar d-flex flex-column p-3">
    <h4 class="mb-4 text-center">Park<span>LK</span></h4>
    <a href="#" class="nav-link active" onclick="showSection('parking-section')"><i class="fas fa-car me-2"></i> Parking Slots</a>
    <a href="#" class="nav-link" onclick="showSection('user-section')"><i class="fas fa-users me-2"></i> Users</a>
    <a href="#" class="nav-link" onclick="showSection('appointment-section')"><i class="fas fa-calendar-check me-2"></i> Appointments</a>
    <a href="#" class="nav-link" onclick="showSection('transaction-section')"><i class="fas fa-wallet me-2"></i> Transactions</a>
    <a href="#" class="nav-link" onclick="showSection('review-section')"><i class="fas fa-star me-2"></i> Reviews</a>
</div>

<div class="main-content">
    <div id="content-area">
    </div>
</div>

<div class="modal fade" id="entityModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content bg-dark border-secondary">
            <div class="modal-header border-secondary">
                <h5 class="modal-title" id="modalTitle">Entity Action</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="modalForm">
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/app.js"></script>
</body>
</html>
